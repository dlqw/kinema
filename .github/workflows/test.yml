name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1/4, 2/4, 3/4, 4/4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build project
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.browser }}-${{ matrix.shard }}
          path: test-results/screenshots/
          retention-days: 7

  e2e-report:
    name: E2E Test Report
    runs-on: ubuntu-latest
    needs: e2e
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-results-*
          path: test-results/

      - name: Merge HTML reports
        run: npx playwright merge-reports --reporter=html test-results/*
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Generate test summary
        run: |
          echo "### E2E Test Results :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Shard | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | 1/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | 2/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | 3/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | 4/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | 1/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | 2/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | 3/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | 4/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | 1/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | 2/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | 3/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | 4/4 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      - name: Run visual regression tests
        run: npx playwright test --project=chromium --grep="visual"
        continue-on-error: true

      - name: Upload visual regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: test-results/visual-comparison/
          retention-days: 7

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      - name: Run performance tests
        run: npx playwright test --project=chromium --grep="performance"

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: test-results/performance.json
          retention-days: 30
